<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form Example</title>
    
    <!-- Configure your API endpoint and reCAPTCHA site key -->
    <meta name="contact-api" content="YOUR_API_GATEWAY_URL">
    <meta name="recaptcha-site-key" content="YOUR_RECAPTCHA_SITE_KEY">
    
    <!-- Load reCAPTCHA -->
    <script src="js/recaptcha-loader.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Contact Us</h1>
    
    <form id="contact-form" method="post" role="form" aria-describedby="message">
        <p id="message" role="status" aria-live="polite" aria-atomic="true" tabindex="-1"></p>
        
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required aria-required="true">
        </div>
        
        <div class="form-group">
            <label for="mail">Email *</label>
            <input type="email" id="mail" name="mail" required aria-required="true">
        </div>
        
        <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject">
        </div>
        
        <div class="form-group">
            <label for="comment">Message *</label>
            <textarea id="comment" name="comment" rows="5" required aria-required="true"></textarea>
        </div>
        
        <button type="button" id="contact-submit" aria-label="Send message">
            Send Message
        </button>
    </form>
    
    <!-- jQuery (required for contact-form.js) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/contact-form.js"></script>
</body>
</html>
